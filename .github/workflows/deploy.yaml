name: Build, Push, and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Scaleway Container Registry
        if: github.repository_owner == 'riseproject-dev'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: rg.fr-par.scw.cloud/funcscwriseriscvrunnerappqdvknz9s
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Build and push container images
        run: make container-push

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.K8S_KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy and restart DaemonSets
        run: |
          make kubectl-apply-node-labeller
          make kubectl-apply-and-wait-device-plugin
